spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/decp_auth_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}
server:
  port: 8081

user-service:
  url: http://localhost:8082

app:
  frontend-reset-url: ${APP_FRONTEND_RESET_URL:http://localhost:3000/reset-password}
  mail-from: ${MAIL_FROM:no-reply@decp.local}

password-reset:
  token-expiration-ms: ${PASSWORD_RESET_TOKEN_EXPIRATION_MS:900000}

jwt:
  access-token-expiration-ms: 1800000
  refresh-token-expiration-ms: 604800000
