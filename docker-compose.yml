services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: decp-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: decp-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres-auth:
    image: postgres:16
    container_name: decp-postgres-auth
    restart: unless-stopped
    env_file:
      - ./decp-backend/auth-service/.env
    entrypoint: ["bash", "-c", "export POSTGRES_USER=\"$$DB_USERNAME\" POSTGRES_PASSWORD=\"$$DB_PASSWORD\"; exec docker-entrypoint.sh postgres"]
    environment:
      POSTGRES_DB: decp_auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$DB_USERNAME -d decp_auth_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-user:
    image: postgres:16
    container_name: decp-postgres-user
    restart: unless-stopped
    env_file:
      - ./decp-backend/user-service/.env
    entrypoint: ["bash", "-c", "export POSTGRES_USER=\"$$DB_USERNAME\" POSTGRES_PASSWORD=\"$$DB_PASSWORD\"; exec docker-entrypoint.sh postgres"]
    environment:
      POSTGRES_DB: decp_user_db
    ports:
      - "5434:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$DB_USERNAME -d decp_user_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-feed:
    image: postgres:16
    container_name: decp-postgres-feed
    restart: unless-stopped
    env_file:
      - ./decp-backend/feed-service/.env
    entrypoint: ["bash", "-c", "export POSTGRES_USER=\"$$DB_USERNAME\" POSTGRES_PASSWORD=\"$$DB_PASSWORD\"; exec docker-entrypoint.sh postgres"]
    environment:
      POSTGRES_DB: decp_feed_db
    ports:
      - "5435:5432"
    volumes:
      - feed-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$DB_USERNAME -d decp_feed_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-job:
    image: postgres:16
    container_name: decp-postgres-job
    restart: unless-stopped
    env_file:
      - ./decp-backend/job-service/.env
    entrypoint: ["bash", "-c", "export POSTGRES_USER=\"$$DB_USERNAME\" POSTGRES_PASSWORD=\"$$DB_PASSWORD\"; exec docker-entrypoint.sh postgres"]
    environment:
      POSTGRES_DB: decp_job_db
    ports:
      - "5436:5432"
    volumes:
      - job-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$DB_USERNAME -d decp_job_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-notification:
    image: postgres:16
    container_name: decp-postgres-notification
    restart: unless-stopped
    env_file:
      - ./decp-backend/notification-service/.env
    entrypoint: ["bash", "-c", "export POSTGRES_USER=\"$$DB_USERNAME\" POSTGRES_PASSWORD=\"$$DB_PASSWORD\"; exec docker-entrypoint.sh postgres"]
    environment:
      POSTGRES_DB: decp_notification_db
    ports:
      - "5437:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$DB_USERNAME -d decp_notification_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: ./decp-backend/user-service
    image: decp-user-service:latest
    container_name: decp-user-service
    restart: unless-stopped
    env_file:
      - ./decp-backend/user-service/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-user:5432/decp_user_db
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'true < /dev/tcp/localhost/8082'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    depends_on:
      postgres-user:
        condition: service_healthy

  auth-service:
    build:
      context: ./decp-backend/auth-service
    image: decp-auth-service:latest
    container_name: decp-auth-service
    restart: unless-stopped
    env_file:
      - ./decp-backend/auth-service/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/decp_auth_db
      USER_SERVICE_URL: http://user-service:8082
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'true < /dev/tcp/localhost/8081'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    depends_on:
      postgres-auth:
        condition: service_healthy
      user-service:
        condition: service_healthy

  feed-service:
    build:
      context: ./decp-backend/feed-service
    image: decp-feed-service:latest
    container_name: decp-feed-service
    restart: unless-stopped
    env_file:
      - ./decp-backend/feed-service/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-feed:5432/decp_feed_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'true < /dev/tcp/localhost/8083'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    depends_on:
      postgres-feed:
        condition: service_healthy
      kafka:
        condition: service_healthy

  job-service:
    build:
      context: ./decp-backend/job-service
    image: decp-job-service:latest
    container_name: decp-job-service
    restart: unless-stopped
    env_file:
      - ./decp-backend/job-service/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-job:5432/decp_job_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'true < /dev/tcp/localhost/8084'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    depends_on:
      postgres-job:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: ./decp-backend/notification-service
    image: decp-notification-service:latest
    container_name: decp-notification-service
    restart: unless-stopped
    env_file:
      - ./decp-backend/notification-service/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notification:5432/decp_notification_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'true < /dev/tcp/localhost/8085'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    depends_on:
      postgres-notification:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    build:
      context: ./decp-backend/api-gateway
    image: decp-api-gateway:latest
    container_name: decp-api-gateway
    restart: unless-stopped
    env_file:
      - ./decp-backend/api-gateway/.env
    environment:
      SERVICES_AUTH_URL: http://auth-service:8081
      SERVICES_USER_URL: http://user-service:8082
      SERVICES_FEED_URL: http://feed-service:8083
      SERVICES_JOB_URL: http://job-service:8084
      SERVICES_NOTIFICATION_URL: http://notification-service:8085
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'true < /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      feed-service:
        condition: service_healthy
      job-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy

  frontend:
    build:
      context: ./decp-frontend
    image: decp-frontend:latest
    container_name: decp-frontend
    restart: unless-stopped
    env_file:
      - ./decp-frontend/.env
    ports:
      - "5173:5173"
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  auth-db-data:
  user-db-data:
  feed-db-data:
  job-db-data:
  notification-db-data:
